name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []
projects: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Please describe the bug you found.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
      placeholder: |
        <!-- What happened vs what should have happened -->
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        How to reproduce this bug:
        1. Go to '...'
        2. Click on '...'
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: |
        <!-- Description of expected behavior -->
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: |
        <!-- Description of actual behavior including error messages -->
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: (e.g., macOS 14.0, Ubuntu 22.04)
        - Version: (if applicable)
        - Branch:
      placeholder: |
        macOS 14.0 / Ubuntu 22.04
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Attach relevant log output (anonymized)
      placeholder: |
        ```
        [Paste relevant log output here]
        ```
    validations:
      required: false

  - type: checkboxes
    id: requirements
    attributes:
      label: Requirements
      options:
        - label: I have searched for similar issues
          required: true
        - label: I have verified this is reproducible
          required: true
