name: Feature Request
description: Propose a new feature or enhancement
title: "[FEATURE] "
labels: ["feature", "needs-triage"]
assignees: []
projects: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Please describe the feature you would like to see added.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Detailed description of the proposed feature
      placeholder: |
        As a [type of user], I want [goal] so that [benefit].

        ## Acceptance Criteria
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: |
        - Problem: ...
        - Impact: ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical (blocks major feature)
        - P1 - High (important for release)
        - P2 - Medium (nice to have)
        - P3 - Low (future consideration)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?
      placeholder: |
        1. ...
        2. ...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant context (screenshots, mockups, links)
      placeholder: |
        <!-- Add any screenshots, mockups, or links here -->
    validations:
      required: false

  - type: checkboxes
    id: requirements
    attributes:
      label: Requirements
      options:
        - label: I have checked the existing documentation
          required: true
        - label: I have discussed this with the team (if applicable)
          required: false
