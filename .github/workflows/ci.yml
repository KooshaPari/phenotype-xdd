name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken links (if link-checker available)
        run: |
          # Basic markdown linting
          if command -v markdownlint &> /dev/null; then
            markdownlint . --ignore node_modules
          else
            echo "markdownlint not installed, skipping"
          fi
      - name: Verify markdown files
        run: |
          # Count markdown files
          md_count=$(find . -name "*.md" | wc -l)
          echo "Found $md_count markdown files"
          if [ "$md_count" -eq 0 ]; then
            echo "ERROR: No markdown files found"
            exit 1
          fi

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for typos
        uses: crate-ci/typos@v1
        with:
          files: .
